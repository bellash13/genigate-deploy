# Docker Compose - Environnement de production
# Genigate Hospital System

networks:
  genigate-network:
    driver: bridge

volumes:
  storage:
  mysql-data:
  rabbitmq-data:
  letsencrypt:

services:
  # Traefik - Reverse Proxy & SSL
  traefik:
    image: traefik:v2.10
    container_name: genigate-traefik
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@genigate.local"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "8081:80"      # Port 80 occupé sur Windows, utiliser 8081
      - "8443:443"     # Port 443 peut aussi être occupé, utiliser 8443
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - letsencrypt:/letsencrypt
    networks:
      - genigate-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.www.genigate.local`)"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls.certresolver=letsencrypt"

  # MySQL pour Keycloak
  mysql:
    image: mysql:8.0
    container_name: genigate-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: keycloak
      MYSQL_USER: keycloak
      MYSQL_PASSWORD: ${MYSQL_KEYCLOAK_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - genigate-network
    restart: unless-stopped

  # Keycloak
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: genigate-keycloak
    environment:
      KC_DB: mysql
      KC_DB_URL: jdbc:mysql://mysql:3306/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${MYSQL_KEYCLOAK_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: "xforwarded"
    command: start
    depends_on:
      - mysql
    networks:
      - genigate-network
    ports:
      - "8080:8080"    # Accès direct pour test
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.rule=Host(`keycloak.www.genigate.local`)"
      - "traefik.http.routers.keycloak.entrypoints=websecure"
      - "traefik.http.routers.keycloak.tls.certresolver=letsencrypt"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management
    container_name: genigate-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - genigate-network
    ports:
      - "15672:15672"    # Management UI
      - "5672:5672"      # AMQP
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rabbitmq.rule=Host(`rabbitmq.www.genigate.local`)"
      - "traefik.http.routers.rabbitmq.entrypoints=websecure"
      - "traefik.http.routers.rabbitmq.tls.certresolver=letsencrypt"
      - "traefik.http.services.rabbitmq.loadbalancer.server.port=15672"

  # License API
  license-api:
    image: ghcr.io/bellash13/genigate-license-api:${IMAGE_TAG:-latest}
    container_name: genigate-license-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__DefaultConnection: "Data Source=/storage/license-api/license.db"
      RabbitMq__HostName: rabbitmq
      RabbitMq__UserName: ${RABBITMQ_USER}
      RabbitMq__Password: ${RABBITMQ_PASSWORD}
    volumes:
      - storage:/storage
    depends_on:
      - rabbitmq
      - keycloak
    networks:
      - genigate-network
    ports:
      - "5001:80"    # API HTTP
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.license-api.rule=Host(`license.www.genigate.local`)"
      - "traefik.http.routers.license-api.entrypoints=websecure"
      - "traefik.http.routers.license-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.license-api.loadbalancer.server.port=80"

